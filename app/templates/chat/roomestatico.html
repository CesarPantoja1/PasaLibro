<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasaLibro Chat</title>

<style>

:root{
    --pl-primary:#0f766e;
    --pl-primary-dark:#115e59;
    --pl-surface:#ffffff;
    --pl-soft:#f4f7f9;
    --pl-line:#e5e7eb;
    --pl-text:#374151;
    --pl-ink:#111827;
    --pl-success:#10b981;

    --pl-shadow-md:
        0 10px 25px rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#eef2f5;
    color:var(--pl-text);
}

/* NAVBAR */

.navbar{
    background:white;
    border-bottom:1px solid var(--pl-line);

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:1rem 2rem;
}

.navbar h2{
    color:var(--pl-primary);
}

.nav-links{
    display:flex;
    gap:1.5rem;
}

.nav-links a{
    text-decoration:none;
    color:var(--pl-text);
    font-weight:600;
}

/* MAIN */

.container{
    padding:2rem;
}

/* CHAT */

.chat-layout{
    max-width:850px;
    margin:auto;
}

.chat-card{
    background:var(--pl-surface);
    border:1px solid var(--pl-line);
    border-radius:16px;
    overflow:hidden;
    box-shadow:var(--pl-shadow-md);
}

.chat-topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:1rem 1.25rem;

    border-bottom:1px solid var(--pl-line);
    background:#fcfcfd;
}

.chat-topbar h4{
    color:var(--pl-ink);
    font-size:1.1rem;
}

.chat-status{
    color:var(--pl-success);
    font-size:0.9rem;
    font-weight:600;
}

.chat-messages{
    height:420px;
    overflow-y:auto;

    padding:1.25rem;

    background:var(--pl-soft);

    display:flex;
    flex-direction:column;
    gap:0.8rem;
}

.chat-message{
    max-width:75%;
    padding:0.9rem 1rem;

    border-radius:16px;

    line-height:1.4;
    font-size:0.95rem;
}

.sent{
    align-self:flex-end;
    background:var(--pl-primary);
    color:white;
    border-bottom-right-radius:4px;
}

.received{
    align-self:flex-start;
    background:white;
    border:1px solid var(--pl-line);
    color:var(--pl-text);
    border-bottom-left-radius:4px;
}

.chat-input-wrapper{
    display:flex;
    gap:0.75rem;

    padding:1rem 1.25rem;

    border-top:1px solid var(--pl-line);
    background:white;
}

.chat-input-wrapper input{
    flex:1;

    padding:0.85rem 1rem;

    border:1px solid var(--pl-line);
    border-radius:10px;

    outline:none;
}

.chat-input-wrapper button{
    border:none;
    background:var(--pl-primary);
    color:white;

    padding:0.85rem 1.2rem;

    border-radius:10px;

    cursor:pointer;
    font-weight:600;

    transition:0.2s;
}

.chat-input-wrapper button:hover{
    background:var(--pl-primary-dark);
}

@media(max-width:768px){

    .container{
        padding:1rem;
    }

    .chat-message{
        max-width:90%;
    }

    .navbar{
        padding:1rem;
    }

}

</style>
</head>
<body>

<nav class="navbar">

    <h2>PasaLibro</h2>

    <div class="nav-links">
        <a href="#">Libros</a>
        <a href="#">Publicar</a>
        <a href="#">Chats</a>
    </div>

</nav>

<div class="container">

    <div class="chat-layout">

        <div class="chat-card">

            <div class="chat-topbar">
                <h4>Chat del libro</h4>

                <span class="chat-status">
                    En línea
                </span>
            </div>

            <div class="chat-messages">

                <div class="chat-message received">
                    Hola, ¿todavía tienes el libro?
                </div>

                <div class="chat-message sent">
                    Sí, aún está disponible.
                </div>

                <div class="chat-message received">
                    ¿Cuánto tiempo lo usaste?
                </div>

                <div class="chat-message sent">
                    Solo un semestre 😄
                </div>

            </div>

            <div class="chat-input-wrapper">

                <input
                    type="text"
                    placeholder="Escribe un mensaje..."
                >

                <button>
                    Enviar
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
